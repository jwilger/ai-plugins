[final_review.models.codex]
# The pre-filter role owns the all-dimension risk scout, so it requires Sol.
pre_filter = "gpt-5.6-sol"
post_filter = "gpt-5.6-luna"

# Terra handles ordinary repeated lens passes; Sol also handles the conditional
# verifier path when an iteration raises disputed or materially uncertain findings.
lens_review = "gpt-5.6-terra"
verifier = "gpt-5.6-sol"
