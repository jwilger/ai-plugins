# Release configuration for the sidequest crates (published to crates.io via
# release-plz). Publication order follows the dependency layering:
# sidequest-core (no internal deps) is released before sidequest.

[workspace]
allow_dirty = false
# Phase 1 (release-plz.yml) runs `release-plz update` and opens the PR itself on
# a `release-plz-*` branch, which is how CI's mutation-testing job recognizes a
# release PR — so no `pr_labels` here.

[[package]]
name = "sidequest-core"
release = true

[[package]]
name = "sidequest"
release = true
