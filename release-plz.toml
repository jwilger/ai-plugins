# Release configuration for the sidequest crates (published to crates.io via
# release-plz). Publication order follows the dependency layering:
# sidequest-core (no internal deps) is released before sidequest.

[workspace]
allow_dirty = false
# Label the release PR so CI's mutation-testing job (gated on the `release`
# label) runs against it before publish.
pr_labels = ["release"]

[[package]]
name = "sidequest-core"
release = true

[[package]]
name = "sidequest"
release = true
