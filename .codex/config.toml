# Project-scoped MCP servers. All launch from project-local, pinned tools.

[mcp_servers.emc]
command = "sh"
args = ["-c", "root=\"$(git rev-parse --show-toplevel)\" || exit; cd \"$root\" || exit; exec \"$root/.dependencies/cargo/bin/emc\" mcp stdio"]
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = true

[mcp_servers.tiber]
command = "sh"
args = ["-c", "root=\"$(git rev-parse --show-toplevel)\" || exit; cd \"$root\" || exit; exec \"$root/plugins/tiber/bin/tiber\" mcp stdio"]
env_vars = ["SSH_AUTH_SOCK"]
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = true

[mcp_servers.promptfoo]
command = "sh"
args = ["-c", "root=\"$(git rev-parse --show-toplevel)\" || exit; cd \"$root\" || exit; exec \"$root/plugins/agentic-systems-engineering/bin/promptfoo-mcp\""]
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = true
