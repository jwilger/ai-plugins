name: Live evals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  provider-backed-evals:
    name: Claude Code and Codex provider-backed evals
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Load eval secrets
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OPENAI_API_KEY: op://Github Secrets/OPENAI_API_KEY/credential
          ANTHROPIC_API_KEY: op://Github Secrets/ANTHROPIC_API_KEY/credential

      - name: Check secrets
        id: secrets
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ] && [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full-marketplace canaries when secrets are available
        if: steps.secrets.outputs.available == 'true'
        run: |
          nix develop -c scripts/evals/run.sh --suite canary
          mkdir -p evals/out/canary
          cp evals/out/results.json evals/out/canary/results.json
          cp evals/out/report.html evals/out/canary/report.html
          cp evals/out/results.junit.xml evals/out/canary/results.junit.xml
        env:
          CLAUDE_EVAL_MODEL: sonnet
          CODEX_EVAL_MODEL: gpt-5.5
          CODEX_EVAL_REASONING_EFFORT: medium

      - name: Run Claude Code and Codex behavior evals when secrets are available
        if: steps.secrets.outputs.available == 'true'
        run: nix develop -c scripts/evals/run.sh
        env:
          CLAUDE_EVAL_MODEL: sonnet
          CODEX_EVAL_MODEL: gpt-5.5
          CODEX_EVAL_REASONING_EFFORT: medium
          EVAL_SAMPLES: 3

      - name: Explain skipped live evals
        if: steps.secrets.outputs.available != 'true'
        run: echo "Skipping provider-backed evals because OPENAI_API_KEY and ANTHROPIC_API_KEY are not both available."

      - name: Upload live eval artifacts
        if: always() && steps.secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-evals
          retention-days: 30
          path: |
            evals/out/results.json
            evals/out/report.html
            evals/out/results.junit.xml
            evals/out/canary/results.json
            evals/out/canary/report.html
            evals/out/canary/results.junit.xml
