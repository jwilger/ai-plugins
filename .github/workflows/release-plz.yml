name: Release (release-plz)

# Release management (release-plz), phases 1 and 2.
#
# Replaces the former two-file Forgejo pair (release-plz.yml + publish.yml)
# with a single call into the org's shared two-phase release-plz reusable
# workflow (slipstream-eng/gha-workflows), which already implements
# both phases as independent, idempotent jobs:
#
#   - release-pr: runs `release-plz release-pr` on every push to main. It is
#     a no-op when there is nothing new to release, which is what replaces
#     the old Forgejo workflow's explicit
#     `startsWith(head_commit.message, 'chore(release):')` loop guard.
#   - release: runs `release-plz release` on every push to main, publishing
#     sidequest-core then sidequest (dependency order per release-plz.toml)
#     and creating the GitHub release once a release PR has merged. Also a
#     no-op when there is nothing new to publish.
#
# Both jobs mint their own git-write token from the org GitHub App and
# SSH-sign commits/tags with RELEASE_SIGNING_KEY, so the resulting commit
# satisfies main's required-signed-commits branch protection without this
# repo needing to carry its own git-auth/git-signing/release-PR shell
# scripts (formerly .forgejo/scripts/*.sh) -- that logic now lives once in
# gha-workflows instead of being duplicated per repo. The old Forgejo-only
# "close and reopen to supersede" workaround (needed because Forgejo blocked
# force-pushing the release-plz-* branch) is also gone: release-plz-action's
# release-pr command force-updates its own branch in place, and GitHub
# branch protection only guards the default branch.
#
# Runs on GitHub-hosted ubuntu-latest: the self-hosted-gregor runner is
# deprioritized for now, and this job was never fork-reachable anyway
# (push-to-main / workflow_dispatch only, never pull_request), so moving it
# off gregor doesn't change its exposure even though it holds the crates.io
# publish token.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    uses: slipstream-eng/gha-workflows/.github/workflows/rust-release-plz.yml@main
    with:
      runs-on: ubuntu-latest
    secrets:
      cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      release-signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
