name: Trunk Queue Bootstrap

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions: {}

jobs:
  update-no-status-queues:
    name: Set no-status Trunk queues
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.head.ref == 'chore/trunk-queue-admin-bootstrap'
      )
    runs-on: ubuntu-24.04
    steps:
      - name: Load Trunk token
        id: load_secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4
        with:
          version: 2.34.1
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TRUNK_API_TOKEN: op://Github Secrets/TRUNK_API_TOKEN/credential

      - name: Set explicit no-status queue requirements
        env:
          TRUNK_API_TOKEN: ${{ steps.load_secrets.outputs.TRUNK_API_TOKEN }}
          OWNER: jwilger
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TRUNK_API_TOKEN:-}" ]; then
            echo "TRUNK_API_TOKEN was not loaded from 1Password." >&2
            exit 1
          fi

          failures=0

          while IFS=$'\t' read -r repo target_branch; do
            [ -n "$repo" ] || continue
            echo "Updating $OWNER/$repo queue for $target_branch"

            payload="$(
              jq -nc \
                --arg owner "$OWNER" \
                --arg name "$repo" \
                --arg targetBranch "$target_branch" \
                '{
                  repo: {
                    host: "github.com",
                    owner: $owner,
                    name: $name
                  },
                  targetBranch: $targetBranch,
                  requiredStatuses: []
                }'
            )"

            response_file="$(mktemp)"
            status="$(
              curl --silent --show-error \
                --max-time 30 \
                --connect-timeout 10 \
                --output "$response_file" \
                --write-out "%{http_code}" \
                --request POST \
                --url https://api.trunk.io/v1/updateQueue \
                --header "Content-Type: application/json" \
                --header "x-api-token: $TRUNK_API_TOKEN" \
                --data "$payload"
            )"

            if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
              jq -r \
                --arg repo "$repo" \
                --arg targetBranch "$target_branch" \
                '"updated requiredStatuses for " + $repo + "/" + $targetBranch + ": " + (.requiredStatuses | @json)' \
                "$response_file"
            else
              failures=$((failures + 1))
              echo "failed to update $OWNER/$repo $target_branch: HTTP $status" >&2
              cat "$response_file" >&2
            fi

            rm -f "$response_file"
          done <<'QUEUES'
          nixos-config	main
          stochastic_macro	main
          gha-workflows	main
          leadlove-doola-intercom-conversion	main
          dotfiles	master
          jwilger.github.io	master
          tb2	main
          pipe	main
          tpl-phx	main
          geo-places-enricher	main
          prime_ctrl	main
          slipstream-consulting.github.io	main
          home-manager-config-old	main
          ticketmaster_hubspot_sync	main
          ssh-agent-switcher	main
          config_helper	main
          neovim_nix_config	main
          nvim_config	main
          home-manager-config	main
          claude-code-plugins	main
          gh-project-ext	main
          gh-issue-ext	main
          blog	main
          rizer	main
          agent-skills	forgejo/workflow-migration
          warbird	main
          salvo	main
          claudez	main
          todo_list_20260204	main
          todo-list	main
          todo_list_202602060758	main
          todo_list_202502060646	main
          opencode-ghost	main
          observatory	main
          codex-sdlc	main
          commanded_aggregateless	main
          stochastic_macro_marketing_site	main
          metal-nix	main
          sprout	main
          codex-factory	main
          claude-factory	main
          cf-skeleton-2178213088	main
          cf-flagtoggle-0924295867	main
          cf-expense-212124102	main
          anything_app	main
          _cargo-index	main
          QUEUES

          if [ "$failures" -ne 0 ]; then
            echo "$failures queue update(s) failed." >&2
            exit 1
          fi
