name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Full gate (build, fmt, clippy -D warnings, nextest, doctests, bdd, bats)
        run: nix develop -c just ci
      - name: Marketplace validation (jq + manifest sync + prettier)
        run: nix develop -c just validate-marketplace

  security-audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Audit dependencies for known advisories
        run: nix develop -c just audit

  mutation:
    name: Mutation testing (release PRs)
    runs-on: ubuntu-24.04
    # Release PRs are opened on a `release-plz-*` branch (see
    # .forgejo/scripts/create-release-plz-release-pr.sh); a manual `release`
    # label also triggers it.
    if: ${{ startsWith(github.head_ref, 'release-plz-') || contains(github.event.pull_request.labels.*.name, 'release') }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: 100% mutant kill
        run: nix develop -c just mutants

  codex-cross-harness:
    name: Codex cross-harness manifests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Structural check: every Codex manifest is valid. Full `codex`-CLI
      # runtime verification (codex mcp add + codex exec) runs where a
      # Codex login is available.
      - name: Codex manifests are valid JSON
        run: |
          nix develop -c bash -c '
            jq empty .agents/plugins/marketplace.json
            find plugins -path "*/.codex-plugin/plugin.json" -exec jq empty {} \;
          '

  # Ask the auto_review gateway for an automated semantic review of the PR (which
  # contributes the required approval). Skips cleanly when the gateway is not
  # configured; mirrors the eventcore pipeline.
  semantic-review:
    name: Request auto_review semantic review
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      AUTO_REVIEW_GATEWAY_URL: ${{ vars.AUTO_REVIEW_GATEWAY_URL }}
      AR_CI_REVIEW_TOKEN: ${{ secrets.AR_CI_REVIEW_TOKEN }}
    steps:
      - name: Skip when auto_review configuration is not available
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL == '' || env.AR_CI_REVIEW_TOKEN == '' || env.AUTO_REVIEW_GATEWAY_URL == github.server_url }}
        run: |
          echo "auto_review semantic review skipped: set repository variable AUTO_REVIEW_GATEWAY_URL (pointing at ar-gateway, not the Forgejo server) and secret AR_CI_REVIEW_TOKEN"

      - name: Request auto_review review
        continue-on-error: true
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL != '' && env.AR_CI_REVIEW_TOKEN != '' && env.AUTO_REVIEW_GATEWAY_URL != github.server_url }}
        run: |
          set -euo pipefail
          json_payload='{"owner":"${{ github.repository_owner }}","repo":"${{ github.event.repository.name }}","pr_number":${{ github.event.pull_request.number }},"head_sha":"${{ github.event.pull_request.head.sha }}"}'
          response_file="$(mktemp)"
          status="$(curl -sS --connect-timeout 5 --max-time 30 -o "$response_file" -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $AR_CI_REVIEW_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$json_payload" \
            "${AUTO_REVIEW_GATEWAY_URL%/}/reviews/ci")"

          if [ "$status" -eq 401 ] || [ "$status" -eq 403 ]; then
            echo "auto_review semantic review authorization failed with HTTP $status; verify AR_CI_REVIEW_TOKEN matches the gateway" >&2
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "auto_review semantic review request failed with HTTP $status" >&2
            cat "$response_file" >&2
            exit 1
          fi

          echo "auto_review semantic review requested"

  # Single required status check for branch protection: succeeds only when every
  # required job did. `mutation` (release PRs only) and `semantic-review`
  # (pull_request only, best-effort) may be skipped but never failed.
  gate:
    name: CI gate
    runs-on: ubuntu-24.04
    needs: [quality, security-audit, mutation, codex-cross-harness, semantic-review]
    if: always()
    steps:
      - name: Require all required jobs to have succeeded
        run: |
          required="${{ needs.quality.result }} ${{ needs.security-audit.result }} ${{ needs.codex-cross-harness.result }}"
          echo "required job results: $required"
          for result in $required; do
            if [ "$result" != "success" ]; then
              echo "a required job did not succeed: $result"
              exit 1
            fi
          done
          mutation="${{ needs.mutation.result }}"
          echo "mutation result: $mutation"
          if [ "$mutation" = "failure" ]; then
            echo "mutation testing failed"
            exit 1
          fi
