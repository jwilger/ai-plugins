name: Publish to crates.io

# Phase 2: when a release PR merges (its `chore(release):` commit lands on main)
# — or on manual dispatch — publish the workspace crates to crates.io and create
# the Forgejo release. release-plz publishes in dependency order per
# release-plz.toml (sidequest-core before sidequest). See release-plz.yml for
# Phase 1.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  publish:
    name: Publish workspace crates
    runs-on: ubuntu-24.04
    # Run on a release-PR merge, or when dispatched manually.
    if: "github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Nix
        uses: ./.forgejo/actions/setup-nix

      # Quality gates already ran on the release PR (branch protection ensures
      # they passed before merge), so this only publishes.
      - name: Publish to crates.io and create the Forgejo release
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GIT_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          [ -n "$GIT_TOKEN" ] || { echo "RELEASE_PLZ_TOKEN not set; skipping publish."; exit 0; }
          nix develop -c bash -c '
            . ./.forgejo/scripts/configure-release-plz-git-auth.sh
            release-plz release --git-token "$GIT_TOKEN" --forge gitea --config ./release-plz.toml
          '
