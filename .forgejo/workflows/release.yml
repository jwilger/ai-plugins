name: Release

# Scaffold mirroring the eventcore release pipeline. Requires repository secrets
# configured in Forgejo:
#   RELEASE_PLZ_TOKEN      forge PAT (push + open PRs; triggers downstream CI)
#   CARGO_REGISTRY_TOKEN   crates.io publish token
# and, for signed release commits, RELEASE_SIGNING_KEY plus the signing vars.
# See AGENTS.md ("Release").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Open release PR + publish merged releases to crates.io
        env:
          GIT_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          [ -n "$GIT_TOKEN" ] || { echo "RELEASE_PLZ_TOKEN not set; skipping."; exit 0; }
          nix develop -c bash -c '
            release-plz release-pr --git-token "$GIT_TOKEN" --forge gitea --config release-plz.toml || true
            release-plz release --git-token "$GIT_TOKEN" --forge gitea --config release-plz.toml
          '
