name: DIAG

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  diag-report:
    name: diag report error via status
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.forgejo/actions/setup-nix
      - name: Run nix develop and report the error as a commit status
        run: |
          set +e
          nix develop --command true > /tmp/o.txt 2>&1
          ec=$?
          {
            echo "exit=$ec"
            grep -iE 'error|fatal|killed|cannot|denied|failed|no space|out of memory|dubious|attribute|recursion' /tmp/o.txt | head -4
            echo "TAIL:"; tail -3 /tmp/o.txt
          } > /tmp/msg.txt
          desc="$(python3 -c "import sys; print(open('/tmp/msg.txt').read().replace(chr(10),' | '))" | cut -c1-240)"
          python3 -c "import json,sys; print(json.dumps({'state':'error','context':'diag-error','description':sys.argv[1]}))" "$desc" > /tmp/payload.json
          curl -sS -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/statuses/${{ github.sha }}"
          echo "reported: $desc"
