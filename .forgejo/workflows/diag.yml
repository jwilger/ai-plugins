name: DIAG

on:
  pull_request:
    branches: [main]

jobs:
  diag-capture:
    name: diag capture nix develop error
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.forgejo/actions/setup-nix
      - name: Capture nix develop output + disk
        run: |
          set +e
          echo "== df before ==" > /tmp/diag.txt
          df -h >> /tmp/diag.txt 2>&1
          echo "== nix develop --command true ==" >> /tmp/diag.txt
          nix develop --command true >> /tmp/diag.txt 2>&1
          echo "EXIT=$?" >> /tmp/diag.txt
          echo "== df after ==" >> /tmp/diag.txt
          df -h >> /tmp/diag.txt 2>&1
          tail -c 12000 /tmp/diag.txt > /tmp/diag-tail.txt
          cat /tmp/diag-tail.txt
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: diag
          path: /tmp/diag-tail.txt
