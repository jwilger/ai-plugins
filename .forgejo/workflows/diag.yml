name: DIAG

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  diag-report:
    name: diag report error via status
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.forgejo/actions/setup-nix
      - name: Probe substitution + nix develop, report via commit status
        run: |
          set +e
          cfg="$(nix config show 2>/dev/null | grep -E '^(substituters|require-sigs|trusted-public-keys) ' | sed 's/ =.*=/=/' | tr '\n' ';' | cut -c1-90)"
          # Directly test substituting nodejs by store path (cache HAS it).
          nix-store -r --no-build-output /nix/store/znxrv89969njb8fxyyn8rz4ygmmcjpw9-nodejs-22.23.1 > /tmp/sub.txt 2>&1
          subec=$?
          subline="$(grep -iE 'building|copying|error|cannot|refused|download' /tmp/sub.txt | head -1)"
          t0=$(date +%s); nix develop --command true > /tmp/o.txt 2>&1; ec=$?; t1=$(date +%s)
          msg="dev_ec=$ec dur=$((t1-t0))s sub_ec=$subec sub=[$subline] cfg=[$cfg] $(tail -1 /tmp/o.txt)"
          desc="$(python3 -c "import sys;print(sys.argv[1])" "$msg" | cut -c1-240)"
          state=error; [ "$ec" -eq 0 ] && state=success
          python3 -c "import json,sys;print(json.dumps({'state':sys.argv[1],'context':'diag-error','description':sys.argv[2]}))" "$state" "$desc" > /tmp/p.json
          curl -sS -X POST -H "Authorization: token ${{ github.token }}" -H "Content-Type: application/json" \
            -d @/tmp/p.json "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/statuses/${{ github.sha }}"
          echo "reported [$state]: $desc"
